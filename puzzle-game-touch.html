<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>내 그림 퍼즐</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #fff9f0 0%, #fff0f9 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  h1 { font-size: 28px; color: #d85a30; margin-bottom: 6px; text-align: center; }
  .subtitle { font-size: 15px; color: #888; margin-bottom: 24px; text-align: center; }
  .card {
    background: white;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 560px;
    margin-bottom: 20px;
  }
  .upload-area {
    border: 3px dashed #f0997b;
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 16px;
    background-size: cover;
    background-position: center;
  }
  .upload-area:hover { background-color: #fff5f0; }
  .upload-icon { font-size: 48px; margin-bottom: 8px; }
  .upload-label { font-size: 16px; color: #d85a30; font-weight: 600; }
  .upload-sub { font-size: 13px; color: #aaa; margin-top: 4px; }
  #fileInput { display: none; }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .controls label { font-size: 15px; color: #555; font-weight: 600; }
  .size-btn {
    padding: 8px 18px; border-radius: 30px; border: 2px solid #f0997b;
    background: white; color: #d85a30; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .size-btn.active, .size-btn:hover { background: #d85a30; color: white; border-color: #d85a30; }
  .start-btn {
    width: 100%; padding: 14px; border-radius: 30px; border: none;
    background: linear-gradient(135deg, #d85a30, #f0997b);
    color: white; font-size: 18px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
  }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .start-btn:hover:not(:disabled) { opacity: 0.9; }

  #gameArea { display: none; width: 100%; max-width: 560px; }
  .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .game-title { font-size: 18px; font-weight: 700; color: #d85a30; }
  .hint-toggle {
    padding: 6px 14px; border-radius: 20px; border: 2px solid #d85a30;
    background: white; color: #d85a30; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .reset-btn {
    padding: 6px 14px; border-radius: 20px; border: 2px solid #378add;
    background: white; color: #378add; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .hint-img { border-radius: 12px; border: 2px solid #ddd; display: none; margin-bottom: 12px; max-width: 100%; }
  .hint-img.visible { display: block; }

  #puzzleContainer {
    position: relative;
    margin: 0 auto;
    touch-action: none;
  }
  .puzzle-grid {
    display: grid;
    gap: 3px;
    background: #eee;
    border-radius: 12px;
    padding: 3px;
  }
  .puzzle-cell {
    border-radius: 8px;
    position: relative;
    background: #f0f0f0;
    border: 2px dashed #ddd;
    transition: border-color 0.2s, background 0.2s;
  }
  .puzzle-cell.correct { border: 2px solid #63992260; background: #eaf3de; }
  .puzzle-cell.over { border-color: #f0997b; background: #fff5f0; }

  .puzzle-piece {
    position: absolute;
    top: 0; left: 0;
    border-radius: 7px;
    background-size: cover;
    cursor: grab;
    transition: box-shadow 0.1s, transform 0.1s;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .puzzle-piece.dragging {
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    transform: scale(1.08);
    cursor: grabbing;
    z-index: 1000;
    position: fixed;
    border-radius: 8px;
  }
  .puzzle-piece.correct { border: 2px solid #63992280; }

  .win-banner {
    display: none; text-align: center; padding: 24px; background: white;
    border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    margin-top: 16px; max-width: 560px; width: 100%;
  }
  .win-banner.show { display: block; }
  .win-emoji { font-size: 52px; }
  .win-text { font-size: 24px; font-weight: 700; color: #d85a30; margin: 8px 0 4px; }
  .win-sub { font-size: 15px; color: #888; margin-bottom: 16px; }
  .again-btn {
    padding: 12px 28px; border-radius: 30px; border: none;
    background: linear-gradient(135deg, #d85a30, #f0997b);
    color: white; font-size: 16px; font-weight: 700; cursor: pointer;
  }
  canvas { display: none; }
</style>
</head>
<body>

<h1>🎨 내 그림 퍼즐</h1>
<p class="subtitle">그림을 올리면 퍼즐로 만들어드려요!</p>

<div class="card" id="uploadCard">
  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">📷</div>
    <div class="upload-label">사진 올리기</div>
    <div class="upload-sub">클릭하거나 사진을 여기에 끌어다 놓으세요</div>
  </div>
  <input type="file" id="fileInput" accept="image/*">
  <div class="controls">
    <label>조각 수:</label>
    <button class="size-btn active" onclick="selectSize(this, 3)">3×3</button>
    <button class="size-btn" onclick="selectSize(this, 4)">4×4</button>
    <button class="size-btn" onclick="selectSize(this, 5)">5×5</button>
  </div>
  <button class="start-btn" id="startBtn" onclick="startGame()" disabled>퍼즐 시작!</button>
</div>

<div id="gameArea">
  <div class="card" style="padding:16px;">
    <div class="game-header">
      <span class="game-title">퍼즐 맞추기</span>
      <div style="display:flex;gap:8px;">
        <button class="hint-toggle" onclick="toggleHint()">힌트 보기</button>
        <button class="reset-btn" onclick="resetGame()">다시하기</button>
      </div>
    </div>
    <img id="hintImg" class="hint-img" alt="원본 그림">
    <p style="font-size:13px;color:#aaa;margin-bottom:10px;text-align:center;">조각을 길게 눌러서 원하는 자리에 놓으세요!</p>
    <div id="puzzleContainer">
      <div class="puzzle-grid" id="puzzleGrid"></div>
    </div>
  </div>
</div>

<div class="win-banner" id="winBanner">
  <div class="win-emoji">🎉</div>
  <div class="win-text">완성했어요!</div>
  <div class="win-sub">대단해요! 퍼즐을 다 맞췄어요!</div>
  <button class="again-btn" onclick="resetAll()">다른 그림으로 하기</button>
</div>

<canvas id="canvas"></canvas>

<script>
let gridSize = 3;
let imageDataUrl = null;
let pieceSize = 90;
let order = [];
let dragEl = null;
let dragOriginCell = null;
let dragOffsetX = 0;
let dragOffsetY = 0;

function selectSize(btn, size) {
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  gridSize = size;
}

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadImage(file);
});

const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', e => { e.preventDefault(); });
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    imageDataUrl = ev.target.result;
    uploadArea.style.backgroundImage = `url(${imageDataUrl})`;
    uploadArea.style.backgroundSize = 'cover';
    uploadArea.style.backgroundPosition = 'center';
    uploadArea.querySelector('.upload-icon').textContent = '✅';
    uploadArea.querySelector('.upload-label').textContent = '이미지 업로드 완료!';
    uploadArea.querySelector('.upload-sub').textContent = '다른 사진을 올리려면 다시 클릭하세요';
    document.getElementById('startBtn').disabled = false;
  };
  reader.readAsDataURL(file);
}

function startGame() {
  if (!imageDataUrl) return;
  document.getElementById('uploadCard').style.display = 'none';
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('winBanner').classList.remove('show');
  buildPuzzle();
}

function buildPuzzle() {
  const maxW = Math.min(window.innerWidth - 64, 520);
  pieceSize = Math.floor((maxW - (gridSize + 1) * 3) / gridSize);

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const totalSize = pieceSize * gridSize;
  canvas.width = totalSize;
  canvas.height = totalSize;

  const img = new Image();
  img.onload = () => {
    const side = Math.min(img.width, img.height);
    const sx = (img.width - side) / 2;
    const sy = (img.height - side) / 2;
    ctx.drawImage(img, sx, sy, side, side, 0, 0, totalSize, totalSize);

    const pieceDataUrls = [];
    for (let r = 0; r < gridSize; r++) {
      for (let c = 0; c < gridSize; c++) {
        const pc = document.createElement('canvas');
        pc.width = pieceSize;
        pc.height = pieceSize;
        pc.getContext('2d').drawImage(canvas, c * pieceSize, r * pieceSize, pieceSize, pieceSize, 0, 0, pieceSize, pieceSize);
        pieceDataUrls.push(pc.toDataURL());
      }
    }

    document.getElementById('hintImg').src = canvas.toDataURL();

    order = Array.from({length: gridSize * gridSize}, (_, i) => i);
    while (order.every((v, i) => v === i)) {
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }
    }

    renderGrid(pieceDataUrls);
  };
  img.src = imageDataUrl;
}

function renderGrid(pieceDataUrls) {
  const grid = document.getElementById('puzzleGrid');
  grid.style.gridTemplateColumns = `repeat(${gridSize}, ${pieceSize}px)`;
  grid.style.gridTemplateRows = `repeat(${gridSize}, ${pieceSize}px)`;
  grid.innerHTML = '';

  const container = document.getElementById('puzzleContainer');
  const totalSize = pieceSize * gridSize + (gridSize + 1) * 3 + 6;
  container.style.width = totalSize + 'px';

  for (let i = 0; i < gridSize * gridSize; i++) {
    const cell = document.createElement('div');
    cell.className = 'puzzle-cell';
    cell.style.width = pieceSize + 'px';
    cell.style.height = pieceSize + 'px';
    cell.dataset.cellId = i;

    const pieceId = order[i];
    const piece = document.createElement('div');
    piece.className = 'puzzle-piece';
    piece.style.width = pieceSize + 'px';
    piece.style.height = pieceSize + 'px';
    piece.style.backgroundImage = `url(${pieceDataUrls[pieceId]})`;
    piece.dataset.pieceId = pieceId;

    cell.appendChild(piece);
    grid.appendChild(cell);

    if (pieceId === i) cell.classList.add('correct');

    addPieceEvents(piece, pieceDataUrls);
  }
}

function addPieceEvents(piece, pieceDataUrls) {
  let startX, startY, moved;

  function onStart(cx, cy) {
    moved = false;
    startX = cx;
    startY = cy;
    dragEl = piece;
    dragOriginCell = piece.parentElement;

    const rect = piece.getBoundingClientRect();
    dragOffsetX = cx - rect.left;
    dragOffsetY = cy - rect.top;

    piece.classList.add('dragging');
    piece.style.left = (rect.left) + 'px';
    piece.style.top = (rect.top) + 'px';
    piece.style.width = pieceSize + 'px';
    piece.style.height = pieceSize + 'px';
    document.body.appendChild(piece);
  }

  function onMove(cx, cy) {
    if (!dragEl) return;
    moved = true;
    dragEl.style.left = (cx - dragOffsetX) + 'px';
    dragEl.style.top = (cy - dragOffsetY) + 'px';

    document.querySelectorAll('.puzzle-cell').forEach(c => c.classList.remove('over'));
    const target = getCellAt(cx, cy);
    if (target) target.classList.add('over');
  }

  function onEnd(cx, cy) {
    if (!dragEl) return;
    document.querySelectorAll('.puzzle-cell').forEach(c => c.classList.remove('over'));

    const target = getCellAt(cx, cy);
    if (target && target !== dragOriginCell) {
      const targetPiece = target.querySelector('.puzzle-piece');
      dragEl.classList.remove('dragging');
      dragEl.style.position = 'absolute';
      dragEl.style.left = '0';
      dragEl.style.top = '0';

      if (targetPiece) {
        dragOriginCell.appendChild(targetPiece);
        targetPiece.style.position = 'absolute';
        targetPiece.style.left = '0';
        targetPiece.style.top = '0';
        checkCell(dragOriginCell);
      }
      target.appendChild(dragEl);
      checkCell(target);
    } else {
      dragEl.classList.remove('dragging');
      dragEl.style.position = 'absolute';
      dragEl.style.left = '0';
      dragEl.style.top = '0';
      dragOriginCell.appendChild(dragEl);
    }

    dragEl = null;
    dragOriginCell = null;
    checkWin();
  }

  piece.addEventListener('mousedown', e => {
    e.preventDefault();
    onStart(e.clientX, e.clientY);
  });
  document.addEventListener('mousemove', e => { if (dragEl === piece) onMove(e.clientX, e.clientY); });
  document.addEventListener('mouseup', e => { if (dragEl === piece) onEnd(e.clientX, e.clientY); });

  piece.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    onStart(t.clientX, t.clientY);
  }, { passive: false });
  piece.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    onMove(t.clientX, t.clientY);
  }, { passive: false });
  piece.addEventListener('touchend', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    onEnd(t.clientX, t.clientY);
  }, { passive: false });
}

function getCellAt(x, y) {
  const cells = document.querySelectorAll('.puzzle-cell');
  for (const cell of cells) {
    const r = cell.getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return cell;
  }
  return null;
}

function checkCell(cell) {
  const piece = cell.querySelector('.puzzle-piece');
  const cellId = parseInt(cell.dataset.cellId);
  if (piece && parseInt(piece.dataset.pieceId) === cellId) {
    cell.classList.add('correct');
    piece.classList.add('correct');
  } else {
    cell.classList.remove('correct');
    if (piece) piece.classList.remove('correct');
  }
}

function checkWin() {
  const cells = document.querySelectorAll('.puzzle-cell');
  const allCorrect = Array.from(cells).every(cell => {
    const piece = cell.querySelector('.puzzle-piece');
    return piece && parseInt(piece.dataset.pieceId) === parseInt(cell.dataset.cellId);
  });
  if (allCorrect) {
    setTimeout(() => {
      document.getElementById('winBanner').classList.add('show');
      document.getElementById('winBanner').scrollIntoView({ behavior: 'smooth' });
    }, 300);
  }
}

function toggleHint() {
  const img = document.getElementById('hintImg');
  const btn = document.querySelector('.hint-toggle');
  if (img.classList.contains('visible')) {
    img.classList.remove('visible');
    btn.textContent = '힌트 보기';
  } else {
    img.classList.add('visible');
    btn.textContent = '힌트 숨기기';
  }
}

function resetGame() {
  document.getElementById('hintImg').classList.remove('visible');
  document.querySelector('.hint-toggle').textContent = '힌트 보기';
  document.getElementById('winBanner').classList.remove('show');
  buildPuzzle();
}

function resetAll() {
  imageDataUrl = null;
  document.getElementById('uploadCard').style.display = 'block';
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('winBanner').classList.remove('show');
  document.getElementById('fileInput').value = '';
  const ua = document.getElementById('uploadArea');
  ua.style.backgroundImage = '';
  ua.querySelector('.upload-icon').textContent = '📷';
  ua.querySelector('.upload-label').textContent = '사진 올리기';
  ua.querySelector('.upload-sub').textContent = '클릭하거나 사진을 여기에 끌어다 놓으세요';
  document.getElementById('startBtn').disabled = true;
}
</script>
</body>
</html>
